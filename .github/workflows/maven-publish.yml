name: Publish Java Package with Maven

on:
  release:
    types: [published]

concurrency:
  group: maven-package-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java 17 and GitHub Packages
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Validate immutable release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          project_version="$(mvn --quiet --no-transfer-progress \
            org.apache.maven.plugins:maven-help-plugin:3.5.2:evaluate \
            -Dexpression=project.version -DforceStdout)"
          release_version="${RELEASE_TAG#v}"
          if [[ "$project_version" == *-SNAPSHOT ]]; then
            echo "Refusing to publish a mutable SNAPSHOT version" >&2
            exit 1
          fi
          if [[ "$project_version" != "$release_version" ]]; then
            echo "POM version '$project_version' does not match release tag '$RELEASE_TAG'" >&2
            exit 1
          fi

      - name: Publish to GitHub Packages
        run: mvn --batch-mode --no-transfer-progress clean deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
